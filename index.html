<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      color: #7aa2ff;
    }

    .board {
      width: 90%;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: #121a2b;
      margin: 10px 0;
      padding: 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      border: 1px solid #1f2a44;
    }

    .id {
      font-family: monospace;
      color: #9ad1ff;
    }

    .points {
      color: #00ff99;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>🔥 Leaderboard</h1>
  <div class="board" id="board"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDW5APPZMu-lojVRNg89ZDBEY14YD77xd4",
  authDomain: "ecolife--v1.firebaseapp.com",
  databaseURL: "https://ecolife--v1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ecolife--v1",
  storageBucket: "ecolife--v1.firebasestorage.app",
  messagingSenderId: "155183147180",
  appId: "1:155183147180:web:41acb23fad3af387ea1709"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const board = document.getElementById("board");

function render(data) {
  board.innerHTML = "";

  if (!data) return;

  const arr = Object.entries(data).map(([id, val]) => ({
    id,
    points: val?.points || 0
  }));

  // ascending order
  arr.sort((a, b) => b.points - a.points);

  arr.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="id">${item.id}</div>
      <div class="points">${item.points}</div>
    `;
    board.appendChild(div);
  });
}

// 🔥 realtime listener (YOUR PATH)
firebase.database().ref("unlinked_uids").on("value", (snap) => {
  console.log("DATA:", snap.val());
  render(snap.val());
});
</script>

</body>
</html>
